<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fric-Frac.fr - Salons de Poker Premium</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Garamond&family=Montserrat:wght@400;600&display=swap');
        body {
            background-color: #050b14;
            color: #d1d5db;
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding: 0;
            background-image: radial-gradient(circle at top, #1e3a8a 0%, #050b14 80%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        header {
            text-align: center;
            padding: 3rem 1rem 1rem;
        }
        svg {
            width: 100px;
            height: 100px;
            filter: drop-shadow(0 4px 6px rgba(59, 130, 246, 0.4));
        }
        h1 {
            font-family: 'Garamond', serif;
            font-size: 3.2rem;
            color: #ffffff;
            margin: 1rem 0 0.5rem;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            letter-spacing: 2px;
        }
        .tagline {
            color: #f43f5e;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-size: 0.85rem;
            margin-bottom: 2rem;
            font-weight: 600;
        }
        .main-container {
            max-width: 900px;
            width: 90%;
            background: rgba(15, 23, 42, 0.8);
            border: 2px solid #3b82f6;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border-radius: 16px;
            padding: 2.5rem;
            margin-bottom: 3rem;
            backdrop-filter: blur(10px);
        }
        .poker-tables {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin: 1.5rem 0 2.5rem;
        }
        @media (max-width: 600px) {
            .poker-tables { grid-template-columns: 1fr; }
        }
        .table-card {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(59, 130, 246, 0.2);
            border-radius: 8px;
            padding: 1.5rem;
            text-align: center;
        }
        .table-title {
            font-family: 'Garamond', serif;
            font-size: 1.5rem;
            color: #ffffff;
            margin-bottom: 0.8rem;
        }
        .table-details {
            font-size: 0.9rem;
            color: #9ca3af;
            margin-bottom: 1.5rem;
        }
        .btn-join {
            background: #ef4444;
            color: #fff;
            border: none;
            padding: 8px 24px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-join:hover {
            background: #dc2626;
        }
        .btn-back {
            background: transparent;
            color: #3b82f6;
            border: 2px solid #3b82f6;
            padding: 12px 30px;
            border-radius: 8px;
            font-family: 'Garamond', serif;
            font-weight: 700;
            font-size: 1.1rem;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-block;
            text-align: center;
        }
        .btn-back:hover {
            background: #3b82f6;
            color: #ffffff;
        }
    </style>
</head>
<body>
    <header>
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <path d="M50,15 C45,35 25,45 25,60 C25,75 50,75 50,75 C50,75 75,75 75,60 C75,45 55,35 50,15 Z" fill="#3b82f6" stroke="#fff" stroke-width="2"/>
            <path d="M50,75 L50,85 L45,85 L55,85 Z" stroke="#fff" stroke-width="3"/>
            <circle cx="50" cy="55" r="5" fill="#ef4444"/>
        </svg>
        <h1>Fric-Frac Poker</h1>
        <div class="tagline">Salons Exclusifs et Blackjack en Ligne</div>
    </header>

    <div class="main-container">
        <h2 style="font-family: 'Garamond', serif; text-align: center; color: #fff; font-size: 1.8rem; margin-bottom: 2rem;">Salons Actifs</h2>

        <div class="poker-tables">
            <div class="table-card">
                <div class="table-title">Salon Paris (VIP)</div>
                <div class="table-details">Texas Hold'em | No Limit | €10 / €20</div>
                <button class="btn-join">Rejoindre</button>
            </div>
            <div class="table-card">
                <div class="table-title">Salon Monaco</div>
                <div class="table-details">Omaha | Limit | €5 / €10</div>
                <button class="btn-join">Rejoindre</button>
            </div>
        </div>

        <div style="text-align: center;">
            <a href="index.html" class="btn-back">Retour au Portail</a>
        </div>
    </div>
</body>
</html>
