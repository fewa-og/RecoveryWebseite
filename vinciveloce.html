<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VinciVeloce.it - Gratta e Vinci Online</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Racing+Sans+One&family=Montserrat:wght@400;700&display=swap');
        body {
            background-color: #0d0d0d;
            color: #f3f4f6;
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding: 0;
            background-image: radial-gradient(circle at top, #1e0f0f 0%, #0d0d0d 80%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        header {
            text-align: center;
            padding: 3rem 1rem 1rem;
        }
        svg {
            width: 100px;
            height: 100px;
            filter: drop-shadow(0 4px 10px rgba(16, 185, 129, 0.4));
        }
        h1 {
            font-family: 'Racing Sans One', cursive;
            font-size: 3.2rem;
            color: #ef4444;
            margin: 1rem 0 0.5rem;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
            letter-spacing: 1px;
        }
        .tagline {
            color: #10b981;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 0.85rem;
            margin-bottom: 2rem;
            font-weight: 600;
        }
        .main-container {
            max-width: 900px;
            width: 90%;
            background: #141414;
            border: 2px solid #10b981;
            box-shadow: 0 10px 30px rgba(16, 185, 129, 0.2);
            border-radius: 16px;
            padding: 2.5rem;
            margin-bottom: 3rem;
            text-align: center;
        }
        .scratch-card {
            border: 2px dashed #ef4444;
            background: #1a1a1a;
            border-radius: 12px;
            padding: 2rem;
            margin: 1.5rem auto 2.5rem;
            max-width: 400px;
        }
        .scratch-title {
            font-family: 'Racing Sans One', cursive;
            color: #eab308;
            font-size: 1.8rem;
            margin-bottom: 1.5rem;
        }
        .scratch-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }
        .scratch-box {
            background: #eab308;
            height: 80px;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
            font-weight: bold;
            color: #000;
            cursor: pointer;
            transition: all 0.3s;
        }
        .scratch-box:hover {
            transform: scale(1.05);
            background: #fff;
        }
        .btn-back {
            background: #10b981;
            color: #ffffff;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-family: 'Racing Sans One', cursive;
            font-size: 1.1rem;
            text-decoration: none;
            cursor: pointer;
            transition: background 0.2s;
            display: inline-block;
            box-shadow: 0 4px 10px rgba(16, 185, 129, 0.4);
        }
        .btn-back:hover {
            background: #059669;
        }
    </style>
</head>
<body>
    <header>
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <circle cx="50" cy="50" r="35" fill="none" stroke="#10b981" stroke-width="5"/>
            <circle cx="50" cy="50" r="28" fill="none" stroke="#fff" stroke-width="2"/>
            <path d="M50,15 L50,85 M15,50 L85,50" stroke="#ef4444" stroke-width="3"/>
            <path d="M42,42 L58,42 L56,54 C56,58 44,58 44,54 Z" fill="#eab308"/>
            <path d="M50,56 L50,62 M45,62 L55,62" stroke="#eab308" stroke-width="2"/>
        </svg>
        <h1>VinciVeloce</h1>
        <div class="tagline">Gratta e Vinci Immediato &amp; Lotterie Istantanee</div>
    </header>

    <div class="main-container">
        <div class="scratch-card">
            <div class="scratch-title">Super Velocità</div>
            <div class="scratch-grid">
                <div class="scratch-box">€100</div>
                <div class="scratch-box">€5</div>
                <div class="scratch-box">€1000</div>
                <div class="scratch-box">TRY</div>
                <div class="scratch-box">€100</div>
                <div class="scratch-box">TRY</div>
            </div>
        </div>

        <a href="index.html" class="btn-back">Ritorna al Portale</a>
    </div>
</body>
</html>
